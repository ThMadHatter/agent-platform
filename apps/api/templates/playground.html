<!DOCTYPE html>
<html>
<head>
    <title>Agent Playground - Agent Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Playground</li>
          </ol>
        </nav>

        <h1>Agent Playground</h1>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Execute Agent</div>
                    <div class="card-body">
                        <form id="executeForm">
                            <div class="mb-3">
                                <label class="form-label">Select Agent</label>
                                <select class="form-select" id="agentName">
                                    {% for agent in agents %}
                                    <option value="{{ agent }}">{{ agent }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Input Data (JSON)</label>
                                <textarea class="form-control" id="inputData" rows="10">{
  "patient_id": "P123",
  "extraction_type": "general",
  "document_url": "https://example.com/medical_record.pdf"
}</textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Run Execution</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Result</div>
                    <div class="card-body">
                        <div id="resultArea">
                            <p class="text-muted">Run an agent to see the results here...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('executeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const agentName = document.getElementById('agentName').value;
            const inputData = JSON.parse(document.getElementById('inputData').value);
            const resultArea = document.getElementById('resultArea');

            resultArea.innerHTML = '<div class="spinner-border" role="status"></div><p>Executing...</p>';

            try {
                const response = await fetch(`/api/v1/agents/${agentName}/execute`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(inputData)
                });
                const data = await response.json();
                resultArea.innerHTML = `
                    <div class="alert alert-success">Execution started!</div>
                    <p><strong>Execution ID:</strong> <a href="/executions/${data.execution_id}">${data.execution_id}</a></p>
                    <p>Check the dashboard or click the ID for status updates.</p>
                `;
            } catch (error) {
                resultArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
